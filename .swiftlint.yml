# SwiftLint Configuration for Spatial Audio Calibrator
# https://github.com/realm/SwiftLint
# Optimized for Swift 6 strict concurrency (March 2026)

# Paths to include during linting
included:
  - Sources

# Paths to exclude from linting
excluded:
  - .build
  - .swiftpm
  - DerivedData
  - Package.swift

# Disable rules from the default enabled set
disabled_rules:
  - todo  # We'll add TODOs during development
  - trailing_whitespace  # Handled by SwiftFormat
  - line_length  # Handled by SwiftFormat
  - type_name  # Allow shorter names for audio types
  - identifier_name  # Allow short variable names in DSP code
  - for_where  # Sometimes clearer with if inside for
  - file_length  # Allow longer files for complex DSP code
  - function_body_length  # DSP functions can be longer
  - number_separator  # Don't require underscores in numbers
  - type_contents_order  # Don't enforce specific ordering
  - indentation_width  # Handled by SwiftFormat
  - implicit_optional_initialization  # Explicit nil is clearer
  - vertical_whitespace_between_cases  # Compact switch cases are fine
  - sorted_imports  # Handled by SwiftFormat
  - file_header  # Don't require file headers
  - file_name  # Don't enforce file naming
  - file_name_no_space  # Allow spaces in filenames
  - vertical_whitespace_opening_braces  # Empty lines after braces are fine
  - vertical_whitespace_closing_braces  # Empty lines before braces are fine
  - switch_case_on_newline  # Compact switch cases are fine
  - function_default_parameter_at_end  # Sometimes default first is clearer
  - unavailable_function  # Don't require marking unimplemented
  - implicitly_unwrapped_optional  # Sometimes needed for C interop

# Enable opt-in rules
opt_in_rules:
  # Performance rules
  - array_init
  - contains_over_filter_count
  - contains_over_filter_is_empty
  - contains_over_first_not_nil
  - contains_over_range_nil_comparison
  - empty_collection_literal
  - empty_count
  - empty_string
  - first_where
  - flatmap_over_map_reduce
  - last_where
  - reduce_into
  - sorted_first_last

  # Code quality rules
  - attributes
  - closure_body_length
  - closure_end_indentation
  - closure_spacing
  - collection_alignment
  - discouraged_none_name
  - discouraged_object_literal
  - explicit_init
  - fallthrough
  - fatal_error_message
  - joined_default_parameter
  - legacy_multiple
  - legacy_objc_type
  - let_var_whitespace
  - literal_expression_end_indentation
  - lower_acl_than_parent
  - modifier_order
  - multiline_arguments
  - multiline_function_chains
  - multiline_literal_brackets
  - multiline_parameters
  - operator_usage_whitespace
  - overridden_super_call
  - override_in_extension
  - pattern_matching_keywords
  - prefer_self_type_over_type_of_self
  - prefer_zero_over_explicit_init
  - prohibited_super_call
  - redundant_nil_coalescing
  - redundant_type_annotation
  - return_value_from_void_function
  - static_operator
  - strict_fileprivate
  - switch_case_alignment
  - toggle_bool
  - trailing_closure
  - unneeded_parentheses_in_closure_argument
  - unowned_variable_capture
  - untyped_error_in_catch
  - vertical_parameter_alignment_on_call
  - weak_delegate
  - yoda_condition

  # Swift 6 Concurrency rules (NEW for 2026)
  - async_without_await
  # Note: incompatible_concurrency_annotation is disabled as we use @preconcurrency import

  # Testing rules
  - balanced_xctest_lifecycle
  - single_test_class
  - xct_specific_matcher

  # Accessibility rules
  - nslocalizedstring_key
  - nslocalizedstring_require_bundle

# Analyzer rules (run with `swiftlint analyze`)
analyzer_rules:
  - explicit_self
  - unused_import
  - unused_declaration

# Configurable rule settings
force_cast: error  # Was warning, now error
force_try: error    # Was warning, now error

type_body_length:
  warning: 400
  error: 600

cyclomatic_complexity:
  warning: 15
  error: 25

large_tuple:
  warning: 3
  error: 4

nesting:
  type_level:
    warning: 2
    error: 3

# Closure body length (new in 2026)
closure_body_length:
  warning: 30
  error: 50

# Custom rules
custom_rules:
  no_print_statements:
    included: ".*\\.swift"
    excluded:
      - ".*Test\\.swift"
      - ".*App\\.swift"  # CLI apps need print statements
    name: "No print statements"
    regex: "\\bprint\\s*\\("
    message: "Use logging system instead of print statements"
    severity: warning

  no_debug_print:
    included: ".*\\.swift"
    name: "No debug print"
    regex: "\\bdebugPrint\\s*\\("
    message: "Use logging system instead of debugPrint"
    severity: warning

  # Swift 6 concurrency best practices
  avoid_global_actor_isolation:
    included: ".*\\.swift"
    name: "Avoid global actor isolation"
    regex: "@MainActor\\s+(class|struct|actor|enum)"
    message: "Consider using @MainActor on individual methods instead of entire types for better concurrency"
    severity: warning

  prefer_task_local:
    included: ".*\\.swift"
    name: "Prefer TaskLocal for context"
    regex: "Thread\\.current"
    message: "Prefer TaskLocal values over Thread.current for Swift concurrency"
    severity: warning

# Reporter format (xcode, json, csv, checkstyle, junit, html, emoji, sonarqube, markdown, github-actions-logging)
reporter: "github-actions-logging"

# Fail on warnings in CI (stricter for 2026)
strict: true
