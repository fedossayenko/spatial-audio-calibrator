# SwiftLint Configuration for Spatial Audio Calibrator
# https://github.com/realm/SwiftLint

# Paths to include during linting
included:
  - Sources

# Paths to exclude from linting
excluded:
  - .build
  - .swiftpm
  - DerivedData
  - Package.swift

# Disable rules from the default enabled set
disabled_rules:
  - todo  # We'll add TODOs during development
  - trailing_whitespace  # Handled by SwiftFormat
  - line_length  # Handled by SwiftFormat
  - type_name  # Allow shorter names for audio types
  - identifier_name  # Allow short variable names in DSP code

# Enable opt-in rules
opt_in_rules:
  - anyobject_protocol
  - array_init
  - attributes
  - closure_body_length
  - closure_end_indentation
  - closure_spacing
  - collection_alignment
  - contains_over_filter_count
  - contains_over_filter_is_empty
  - contains_over_first_not_nil
  - contains_over_range_nil_comparison
  - discouraged_none_name
  - discouraged_object_literal
  - empty_collection_literal
  - empty_count
  - empty_string
  - enum_case_associated_values_count
  - explicit_init
  - fallthrough
  - fatal_error_message
  - file_header
  - file_name
  - file_name_no_space
  - first_where
  - flatmap_over_map_reduce
  - function_default_parameter_at_end
  - ibinspectable_in_extension
  - identical_operands
  - implicit_return
  - implicitly_unwrapped_optional
  - indentation_width
  - joined_default_parameter
  - last_where
  - legacy_multiple
  - legacy_objc_type
  - let_var_whitespace
  - literal_expression_end_indentation
  - lower_acl_than_parent
  - modifier_order
  - multiline_arguments
  - multiline_function_chains
  - multiline_literal_brackets
  - multiline_parameters
  - nimble_operator
  - no_extension_access_modifier
  - no_grouping_extension
  - nslocalizedstring_key
  - nslocalizedstring_require_bundle
  - number_separator
  - operator_usage_whitespace
  - optional_enum_case
  - overridden_super_call
  - override_in_extension
  - pattern_matching_keywords
  - prefer_self_type_over_type_of_self
  - prefer_zero_over_explicit_init
  - private_action
  - private_outlet
  - prohibited_interface_builder
  - prohibited_super_call
  - quick_discouraged_call
  - quick_discouraged_focused_test
  - quick_discouraged_pending_test
  - reduce_into
  - redundant_nil_coalescing
  - redundant_type_annotation
  - return_value_from_void_function
  - shorthand_operator
  - single_test_class
  - sorted_first_last
  - sorted_imports
  - static_operator
  - strict_fileprivate
  - switch_case_alignment
  - switch_case_on_newline
  - toggle_bool
  - trailing_closure
  - type_contents_order
  - unavailable_function
  - unneeded_parentheses_in_closure_argument
  - unowned_variable_capture
  - untyped_error_in_catch
  - vertical_parameter_alignment_on_call
  - vertical_whitespace_between_cases
  - vertical_whitespace_closing_braces
  - vertical_whitespace_opening_braces
  - weak_delegate
  - xct_specific_matcher
  - yoda_condition

# Analyzer rules (run with `swiftlint analyze`)
analyzer_rules:
  - explicit_self
  - unused_import
  - unused_declaration

# Configurable rule settings
force_cast: warning
force_try: warning

function_body_length:
  warning: 60
  error: 100

type_body_length:
  warning: 400
  error: 600

file_length:
  warning: 500
  error: 1000

cyclomatic_complexity:
  warning: 15
  error: 25

large_tuple:
  warning: 3
  error: 4

nesting:
  type_level:
    warning: 2
    error: 3

# Custom rules
custom_rules:
  no_print_statements:
    included: ".*\\.swift"
    excluded: ".*Test\\.swift"
    name: "No print statements"
    regex: "\\bprint\\s*\\("
    message: "Use logging system instead of print statements"
    severity: warning

  no_debug_print:
    included: ".*\\.swift"
    name: "No debug print"
    regex: "\\bdebugPrint\\s*\\("
    message: "Use logging system instead of debugPrint"
    severity: warning

# Reporter format (xcode, json, csv, checkstyle, junit, html, emoji, sonarqube, markdown, github-actions-logging)
reporter: "xcode"

# Fail on warnings in CI
strict: false
