# GitHub Actions CI for Spatial Audio Calibrator
# https://docs.github.com/en/actions

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Cancel in-progress runs on the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  SWIFT_VERSION: '5.9'
  DEVELOPER_DIR: /Applications/Xcode.app/Contents/Developer

jobs:
  # ============================================================================
  # Build & Test
  # ============================================================================

  build:
    name: Build & Test
    runs-on: macos-14
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: ${{ env.SWIFT_VERSION }}

      - name: Show Swift version
        run: swift --version

      - name: Cache Swift packages
        uses: actions/cache@v4
        with:
          path: .build
          key: ${{ runner.os }}-spm-${{ hashFiles('Package.swift', 'Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Build
        run: swift build

      - name: Run tests
        run: swift test --parallel

  # ============================================================================
  # Static Analysis
  # ============================================================================

  lint:
    name: SwiftLint
    runs-on: macos-14
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Run SwiftLint
        run: swiftlint lint --strict --reporter github-actions-logging

  format:
    name: SwiftFormat
    runs-on: macos-14
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install SwiftFormat
        run: brew install swiftformat

      - name: Check formatting
        run: |
          swiftformat --lint --dryrun Sources 2>&1 | tee format-output.txt
          if grep -q "would have formatted" format-output.txt; then
            echo "::error::Code formatting issues found. Run 'swiftformat Sources' to fix."
            exit 1
          fi

  periphery:
    name: Dead Code Detection
    runs-on: macos-14
    timeout-minutes: 15
    # Disabled due to crash (exit code 139) - re-enable when Periphery is stable
    if: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: ${{ env.SWIFT_VERSION }}

      - name: Install Periphery
        run: brew install peripheryapp/periphery/periphery

      - name: Build for indexing
        run: swift build

      - name: Run Periphery
        run: periphery scan --setup

  # ============================================================================
  # Pre-commit
  # ============================================================================

  pre-commit:
    name: Pre-commit Hooks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pre-commit
        run: pip install pre-commit

      - name: Cache pre-commit
        uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: ${{ runner.os }}-pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pre-commit-

      - name: Run pre-commit
        run: pre-commit run --all-files --show-diff-on-failure

  # ============================================================================
  # Dependency Security
  # ============================================================================

  security:
    name: Dependency Security
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run security analysis
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'Spatial Audio Calibrator'
          path: '.'
          format: 'HTML'
          out: 'reports'
        continue-on-error: true

  # ============================================================================
  # All Checks
  # ============================================================================

  all-checks:
    name: All Checks Passed
    runs-on: ubuntu-latest
    needs: [build, lint, format, pre-commit]
    if: always()

    steps:
      - name: Check results
        run: |
          if [[ "${{ needs.build.result }}" != "success" ]] || \
             [[ "${{ needs.lint.result }}" != "success" ]] || \
             [[ "${{ needs.format.result }}" != "success" ]] || \
             [[ "${{ needs.pre-commit.result }}" != "success" ]]; then
            echo "❌ Some checks failed"
            exit 1
          fi
          echo "✅ All checks passed!"
