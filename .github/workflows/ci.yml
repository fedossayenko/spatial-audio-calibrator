# GitHub Actions CI for Spatial Audio Calibrator
# https://docs.github.com/en/actions
# Optimized for Swift 6.2 strict concurrency (March 2026)

name: CI

on:
  push:
    branches: [main, develop, 'feature/**']
  pull_request:
    branches: [main, develop]

# Cancel in-progress runs on the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  SWIFT_VERSION: '6.0'
  DEVELOPER_DIR: /Applications/Xcode.app/Contents/Developer

jobs:
  # ============================================================================
  # Build & Test (Swift 6.0)
  # ============================================================================
  build:
    name: Build & Test (Swift 6.0)
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: ${{ env.SWIFT_VERSION }}

      - name: Show Swift version
        run: swift --version

      - name: Cache Swift packages
        uses: actions/cache@v4
        with:
          path: .build
          key: ${{ runner.os }}-spm-${{ env.SWIFT_VERSION }}-${{ hashFiles('Package.swift', 'Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-${{ env.SWIFT_VERSION }}-
            ${{ runner.os }}-spm-

      - name: Build
        run: swift build

      - name: Run tests with coverage
        run: swift test --parallel --enable-code-coverage

      - name: Generate coverage report
        run: |
          xcrun llvm-cov export -format="lcov" \
            .build/debug/SpatialAudioCalibratorPackageTests.xctest/Contents/MacOS/SpatialAudioCalibratorPackageTests \
            -instr-profile .build/debug/codecov/default.profdata \
            > coverage.lcov || true

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          file: ./coverage.lcov
          fail_ci_if_error: false
          verbose: true

  # ============================================================================
  # Build on macOS 14 (Swift 5.10 compatibility check)
  # ============================================================================
  build-compat:
    name: Build (macOS 14 / Swift 5.10)
    runs-on: macos-14
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: '5.10'

      - name: Build
        run: swift build

  # ============================================================================
  # SwiftLint
  # ============================================================================
  lint:
    name: SwiftLint
    runs-on: macos-15
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Show SwiftLint version
        run: swiftlint version

      - name: Run SwiftLint (strict)
        run: swiftlint lint --strict --config .swiftlint.yml --reporter github-actions-logging

      - name: Run SwiftLint Analyzer Rules
        run: swiftlint analyze --config .swiftlint.yml --reporter github-actions-logging || true
        continue-on-error: true

  # ============================================================================
  # SwiftFormat
  # ============================================================================
  format:
    name: SwiftFormat
    runs-on: macos-15
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install SwiftFormat
        run: brew install swiftformat

      - name: Show SwiftFormat version
        run: swiftformat --version

      - name: Check formatting
        run: |
          swiftformat --lint --dryrun Sources Tests --config .swiftformat 2>&1 | tee format-output.txt
          if grep -q "would have formatted" format-output.txt; then
            echo "::error::Code formatting issues found. Run 'swiftformat Sources Tests' locally to fix."
            exit 1
          fi

  # ============================================================================
  # Periphery (Dead Code Detection)
  # ============================================================================
  periphery:
    name: Dead Code Detection
    runs-on: macos-15
    timeout-minutes: 20
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: ${{ env.SWIFT_VERSION }}

      - name: Install Periphery
        run: brew install peripheryapp/periphery/periphery

      - name: Build for indexing
        run: swift build

      - name: Run Periphery
        run: |
          periphery scan \
            --config .periphery.yml \
            --skip-build \
            --index-store-path .build/index/store \
            --strict \
            --quiet || true

  # ============================================================================
  # Swift Package Security Audit
  # ============================================================================
  security:
    name: Dependency Security
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run dependency review
        uses: actions/dependency-review-action@v4
        if: github.event_name == 'pull_request'

      - name: Run security analysis
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'Spatial Audio Calibrator'
          path: '.'
          format: 'HTML'
          out: 'reports'
        continue-on-error: true

  # ============================================================================
  # Pre-commit Hooks (runs on macOS for Swift tools)
  # ============================================================================
  pre-commit:
    name: Pre-commit Hooks
    runs-on: macos-15
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Install SwiftFormat
        run: brew install swiftformat

      - name: Install pre-commit
        run: pip install pre-commit

      - name: Cache pre-commit
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/pre-commit
          key: ${{ runner.os }}-pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pre-commit-

      - name: Run pre-commit (all hooks)
        run: pre-commit run --all-files --show-diff-on-failure

  # ============================================================================
  # Swift 6 Strict Concurrency Check
  # ============================================================================
  concurrency-check:
    name: Swift 6 Strict Concurrency
    runs-on: macos-15
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: ${{ env.SWIFT_VERSION }}

      - name: Build with strict concurrency
        run: |
          swift build \
            -Xswiftc -strict-concurrency=complete \
            -Xswiftc -warnings-as-errors

  # ============================================================================
  # All Checks
  # ============================================================================
  all-checks:
    name: All Checks Passed
    runs-on: ubuntu-latest
    needs: [build, lint, format, pre-commit, concurrency-check]
    if: always()

    steps:
      - name: Check results
        run: |
          if [[ "${{ needs.build.result }}" != "success" ]] || \
             [[ "${{ needs.lint.result }}" != "success" ]] || \
             [[ "${{ needs.format.result }}" != "success" ]] || \
             [[ "${{ needs.pre-commit.result }}" != "success" ]] || \
             [[ "${{ needs.concurrency-check.result }}" != "success" ]]; then
            echo "❌ Some checks failed"
            exit 1
          fi
          echo "✅ All checks passed!"
